# ============================================================
# CI de Kickoff AR
# ============================================================
# En cada push (y pull request) a main, GitHub levanta una
# máquina Linux, compila la app y corre los tests unitarios.
# Si algo se rompe, el commit queda marcado con una ✗ roja y
# llega un email — la red de seguridad básica de todo proyecto.
#
# El badge del README se alimenta de este workflow.
# ============================================================

name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: JDK 21 (requerido por AGP 9)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache de Gradle
        uses: gradle/actions/setup-gradle@v4

      # Los commits hechos desde Windows pueden perder el bit de
      # ejecución del wrapper: lo restauramos por las dudas
      - name: Permisos del wrapper
        run: chmod +x gradlew

      - name: Tests unitarios
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Compilar APK debug
        run: ./gradlew assembleDebug --stacktrace
